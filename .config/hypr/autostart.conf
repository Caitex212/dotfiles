# Polkit
exec-once = /usr/libexec/polkit-mate-authentication-agent-1

# Hyprland Plugins
exec-once = hyprpm reload

# Wallpaper
exec-once = waypaper --restore

# Waybar
exec-once = pkill -f waybar && waybar

# PyWal
exec-once = wal -R

# Load Notification Daemon
exec-once = swaync

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Setup VirtualSin for Discord Audio Streaming
# exec-once = ~/Documents/setup_virtualsink/route_audio.sh

# easyeffects service
exec-once = easyeffects --gapplication-service

# kdeconnect
exec-once = kdeconnect-indicator

# Hyprpolkit
exec-once = systemctl --user start hyprpolkitagent

# Antimicrox for Star Citizen
# delay to let the tray start first
exec-once = sleep 10 && antimicrox --tray --profile ~/t16000_sc.joystick.amgp --profile-controller 2
